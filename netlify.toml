[build]
  command = "cd client && npm install && npm run build && cd ../server && npm install"
  publish = "client/dist"

[functions]
  directory      = "netlify/functions"
  node_bundler   = "esbuild"

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
